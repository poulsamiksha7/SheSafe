{% extends 'reports/base.html' %}
{% block content %}
    <h3>Recent Safety Reports</h3>
    {% for report in reports %}
        <div class="card mb-2 p-3">
            <h5>{{ report.area }}</h5>
            <p class="mb-1">Category: {{ report.category }} | Rating: {{ report.rating }}/5</p>
            <p class="mb-0">{{ report.description }}</p>
        </div>
    {% empty %}
        <p>No reports Yet.</p>
    {% endfor %}
{% endblock %}
