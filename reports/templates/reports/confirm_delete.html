{% extends 'reports/base.html' %}
{% block content %}
    <h3>Delete this report</h3>
    <p>{{ report.locality }}, {{report.city }} - {{report.category }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-btn-danger">Yes,delete</button>
        <a href="{% url 'my_reports' %}" class=""btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
