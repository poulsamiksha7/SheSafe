<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}SheSafe {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <a href="{% url 'home' %}" class="navbar-brand">🛡️ SheSafe</a>
        <div>
            <a href="{% url 'area_list' %}" class="btn btn-outline-light btn-sm">Areas</a>
            {% if user.is_authenticated %}
                <a href="{% url 'add_report' %}" class="btn btn-outline-light btn-sm">Add Report</a>
                <span class="text-white mx-2">Hi, {{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
